services:
  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/student_contest.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-Asia/Almaty}
      NOTIFICATION_POLL_SECONDS: ${NOTIFICATION_POLL_SECONDS:-30}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8000}
    depends_on:
      - backend
    ports:
      - "5173:80"

  telegram-bot:
    build:
      context: ./telegram-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000/api/v1}
      NOTIFICATION_POLL_SECONDS: ${NOTIFICATION_POLL_SECONDS:-30}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
